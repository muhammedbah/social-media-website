<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="logo-info">
          <div class="logo-icon">
            <i class="fa fa-home" style="font-size: 20px"></i>
          </div>
          <div class="logo">
            <h1>logo</h1>
          </div>
        </div>
        <div class="nav-icons">
          <ul>
            <li><i class="fa fa-globe" style="font-size: 20px"></i></li>
            <li><i class="fa fa-user" style="font-size: 20px"></i></li>
            <li><i class="fa fa-envelope" style="font-size: 20px"></i></li>
            <li><i class="fa fa-bell" style="font-size: 20px"></i></li>
          </ul>
        </div>
        <div class="nav-profile">
          <div class="nav-img">
            <img src="./images/navimg.png" alt="" />
          </div>
        </div>
      </nav>

      <div class="container-info">
        <div class="left-sidebar">
          <div class="profile">
            <h1 class="profile-text">my profile</h1>
            <div class="profile-img">
              <img src="/images/avatar3.png" alt="" />
            </div>

            <hr />
            <div class="profile-info">
              <ul>
                <li>
                  <i class="fa fa-pencil" style="font-size: 20px"></i
                  ><span>designer, UI</span>
                </li>
                <li>
                  <i class="fa fa-home" style="font-size: 20px"></i
                  ><span>london, UK</span>
                </li>
                <li>
                  <i class="fa fa-birthday-cake" style="font-size: 20px"></i
                  ><span>april 1, 1988</span>
                </li>
              </ul>
            </div>
          </div>
          <div class="interest-section">
            <div class="activities">
              <div class="my-group">
                <i class="fa fa-circle-o-notch" style="font-size: 20px"
                  ><span class="text">My Groups</span></i
                >
              </div>
              <div class="events">
                <i class="fa fa-calendar-check-o" style="font-size: 20px"
                  ><span class="text">My Events</span></i
                >
              </div>
              <div class="photos">
                <i class="fa fa-group" style="font-size: 20px"
                  ><span class="text">My Photos</span></i
                >
              </div>
            </div>
          </div>
          <div class="interest">
            <h2>interest</h2>
            <div class="buttons">
              <button id="news">news</button>
              <button id="news">w3Schools</button>
              <button id="news">labels</button>
              <button id="news">games</button>
              <button id="news">friends</button>
              <button id="news">games</button>
              <button id="news">friends</button>
              <button id="news">food</button>
              <button id="news">design</button>
              <button id="news">art</button>
              <button id="news">photos</button>
            </div>
          </div>
          <div class="people">
            <div class="ads">
              <h3>Hey!</h3>
              <div class="x">
                <span>X</span>
              </div>
            </div>
            <p>People are looking at your profile. Find out who</p>
          </div>
        </div>
        <div class="main">
          <div class="write">
            <!-- give the span a class name .main-title -->
            <span class="main-title">social media template by w3.css</span>
            <input type="text" placeholder="Status: Feeling Blue">
            <button class="post-btn">
              <i class="fa fa-pencil"></i> <span class="post-span">post</span>
            </button>
          </div>
        </div>
        <div class="right-sidebar"></div>
      </div>
    </div>
  </body>
</html>
